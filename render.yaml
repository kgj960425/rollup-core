services:
  - type: web
    name: rollup-v2-core
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://rollup-v2-web.web.app,http://localhost:5173
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: LOG_LEVEL
        value: INFO
